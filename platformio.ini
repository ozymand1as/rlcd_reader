; PlatformIO Project Configuration File for RLCD EPUB Reader
;
; Based on diy-esp32-epub-reader, ported to Waveshare ESP32-S3-RLCD-4.2

[platformio]
default_envs = rlcd_42
src_dir = src

[common]
platform = espressif32 @ 6.5.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
  https://github.com/leethomason/tinyxml2.git

build_flags =
  -Ofast
  -D__MCUXPRESSO
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES
  -DBOARD_HAS_PSRAM
  -DLOG_ENABLED
  -std=gnu++17

[env:rlcd_42]
extends = common
board = esp32-s3-devkitc-1

build_flags =
  ${common.build_flags}
  ; Board type
  -DBOARD_TYPE_RLCD_42
  ; RLCD display dimensions
  -DRLCD_WIDTH=300
  -DRLCD_HEIGHT=400
  ; SPI pins for RLCD display
  -DRLCD_PIN_MOSI=GPIO_NUM_11
  -DRLCD_PIN_SCK=GPIO_NUM_12
  -DRLCD_PIN_DC=GPIO_NUM_5
  -DRLCD_PIN_CS=GPIO_NUM_40
  -DRLCD_PIN_RST=GPIO_NUM_41
  -DRLCD_PIN_MISO=GPIO_NUM_13
  ; SD Card pins
  -DSD_CARD_PIN_NUM_MISO=GPIO_NUM_13
  -DSD_CARD_PIN_NUM_MOSI=GPIO_NUM_11
  -DSD_CARD_PIN_NUM_CLK=GPIO_NUM_12
  -DSD_CARD_PIN_NUM_CS=GPIO_NUM_10
  ; Button GPIO pins (active low)
  -DBUTTON_UP_GPIO=GPIO_NUM_0
  -DBUTTON_DOWN_GPIO=GPIO_NUM_21
  -DBUTTON_SELECT_GPIO=GPIO_NUM_47
  -DBUTTON_ACTIVE_LEVEL=0
  ; Battery ADC (if available)
  -DBATTERY_ADC_CHANNEL=ADC1_CHANNEL_3

board_build.partitions = partitions.csv
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

lib_ignore =
  epdiy
  m5Paper
  touch
